services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
      args:
        - NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID}
        - NEXT_PUBLIC_TELEGRAM_BOT_USERNAME=${NEXT_PUBLIC_TELEGRAM_BOT_USERNAME}
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - HELIO_WEBHOOK_SECRET=${HELIO_WEBHOOK_SECRET}
      - NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID}
      - NEXT_PUBLIC_TELEGRAM_BOT_USERNAME=${NEXT_PUBLIC_TELEGRAM_BOT_USERNAME}
    depends_on:
      - redis
      - mongodb
    networks:
      - chaintrigger-network
    restart: always

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      target: runner
    environment:
      - MONGO_URI=${MONGO_URI}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - BIRDEYE_API_KEY=${BIRDEYE_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    depends_on:
      - redis
      - mongodb
    networks:
      - chaintrigger-network
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - chaintrigger-network
    restart: always
    # Port 6379 is internal only in prod for security

  mongodb:
    image: mongo:6
    volumes:
      - mongodb_data:/data/db
    networks:
      - chaintrigger-network
    restart: always
    # Port 27017 is internal only in prod for security

networks:
  chaintrigger-network:
    driver: bridge

volumes:
  redis_data:
  mongodb_data:
