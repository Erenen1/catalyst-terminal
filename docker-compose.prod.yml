services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
    ports:
      - "3000:3000"
    # env_file:
    #   - .env.prod
    depends_on:
      - redis
      - mongodb
    networks:
      - chaintrigger-network
    restart: always

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      target: runner
    # env_file:
    #   - .env.prod
    depends_on:
      - redis
      - mongodb
    networks:
      - chaintrigger-network
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - chaintrigger-network
    restart: always
    # Port 6379 is internal only in prod for security

  mongodb:
    image: mongo:6
    volumes:
      - mongodb_data:/data/db
    networks:
      - chaintrigger-network
    restart: always
    # Port 27017 is internal only in prod for security

networks:
  chaintrigger-network:
    driver: bridge

volumes:
  redis_data:
  mongodb_data:
